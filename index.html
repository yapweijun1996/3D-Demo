<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Drive Singapore</title>
<style>
  html,body{margin:0;padding:0;height:100%;height:100dvh;background:#050a14;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;color:#f4f6fb;user-select:none;touch-action:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
  canvas#c{display:block;width:100vw;height:100vh;height:100dvh}
  /* Tap-to-start veil — hides until canvas/click; ui/hud.js takes over after */
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .35s ease;z-index:80;background:radial-gradient(circle at 50% 60%, rgba(10,18,32,0) 0%, rgba(5,10,20,.55) 70%)}
  .overlay.hidden{opacity:0;pointer-events:none}
  .overlay .cta{position:absolute;bottom:80px;display:flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(10,18,32,.62);backdrop-filter:blur(14px) saturate(1.35);-webkit-backdrop-filter:blur(14px) saturate(1.35);border:1px solid rgba(255,255,255,.16);border-radius:999px;font:600 12px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;letter-spacing:.10em;text-transform:uppercase;animation:pulse 2.4s ease-in-out infinite}
  .overlay .cta .dot{width:6px;height:6px;border-radius:50%;background:#F5B344;box-shadow:0 0 12px #F5B344}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.95}50%{transform:scale(1.04);opacity:1}}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.170.0",
    "three/addons/": "https://esm.sh/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay" id="overlay">
  <div class="cta"><span class="dot"></span>Click or press any key to start</div>
</div>
<script>
  // Cache-bust the entry every page load — forces browser to fetch fresh main.js
  // even when behind an aggressive proxy. Server still sends no-cache headers
  // for inner module imports, so the whole graph stays current.
  const __v = Date.now().toString(36);
  const s = document.createElement('script');
  s.type = 'module';
  s.src = './src/main.js?v=' + __v;
  document.body.appendChild(s);
</script>
</body>
</html>
